<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time to Jump Dolomites | Booking Successful</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪂</text></svg>">
</head>
<body style="display:flex; flex-direction:column; min-height:100vh; background: var(--color-navy); color: #fff;">

  <!-- ========== NAVIGATION ========== -->
  <nav class="navbar scrolled" id="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">
        <img src="img/logo.png" alt="Time to Jump Dolomites Logo" style="width:50px;height:50px;border-radius:50%;object-fit:contain;background:#1a2744;">
        <div>
          <span class="navbar__logo-text">Time to Jump Dolomites</span>
          <span class="navbar__logo-tagline">feel the Freedom as a Big</span>
        </div>
      </a>
      <div class="navbar__actions">
        <a href="index.html" class="btn btn--outline btn--sm">Back to Home</a>
      </div>
    </div>
  </nav>

  <!-- ========== SUCCESS CONTENT ========== -->
  <main style="flex:1; display:flex; align-items:center; justify-content:center; padding: 120px 20px;">
    <div style="background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 60px 40px; text-align: center; max-width: 600px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
      <div style="background: linear-gradient(135deg, #10b981, #059669); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1 style="font-family: var(--font-heading); font-size: 2.5rem; margin-bottom: 16px;">Booking Secured!</h1>
      <p style="color: rgba(255, 255, 255, 0.7); font-size: 1.1rem; line-height: 1.6; margin-bottom: 32px;">
        Your credit card was successfully authorized for the 0.00€ hold. You have successfully reserved your seat on the helicopter! An automated confirmation will be sent via WhatsApp shortly.
      </p>
      
      <!-- Call to Action -->
      <a href="index.html" class="btn btn--primary" style="display: inline-flex; align-items: center; gap: 8px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Return to Homepage
      </a>
    </div>
  </main>

  <style>
    /* Premium Glassmorphism base for testing constraints */
    body::before {
      content: '';
      position: absolute;
      top: -20%; left: -10%; right: -10%; bottom: -20%;
      background: radial-gradient(circle at top right, rgba(0, 113, 227, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at bottom left, rgba(230, 57, 70, 0.05) 0%, transparent 40%);
      z-index: -1;
      pointer-events: none;
    }
  </style>
</body>
</html>
