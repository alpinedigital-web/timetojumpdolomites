<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Time to Jump Dolomites</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
</head>
<body class="admin-body">

  <!-- ========== LOGIN SCREEN ========== -->
  <div class="admin-login" id="adminLogin">
    <div class="admin-login__card">
      <img src="img/logo.png" alt="Logo" class="admin-login__logo">
      <h1 class="admin-login__title">Admin Panel</h1>
      <p class="admin-login__subtitle">Time to Jump Dolomites — Content Management</p>

      <form class="admin-login__form" id="adminLoginForm">
        <div class="admin-input-group">
          <label for="adminEmail">Email Address</label>
          <input type="email" id="adminEmail" placeholder="admin@example.com" required autocomplete="email">
        </div>
        <div class="admin-input-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="admin-login__error" id="loginError"></div>
        <button type="submit" class="admin-btn admin-btn--primary admin-btn--full">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Sign In
        </button>
      </form>
    </div>
  </div>

  <!-- ========== DASHBOARD ========== -->
  <div class="admin-dashboard" id="adminDashboard">

    <!-- Sidebar -->
    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar__header">
        <img src="img/logo.png" alt="Logo" class="admin-sidebar__logo">
        <div class="admin-sidebar__brand">
          TTJD Admin
          <small>Content Management</small>
        </div>
      </div>

      <nav class="admin-sidebar__nav" id="sidebarNav">
        <!-- Populated by JS -->
      </nav>

      <div class="admin-sidebar__footer">
        <button class="admin-btn admin-btn--outline admin-btn--sm admin-btn--full" id="exportBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export JSON
        </button>
        <button class="admin-btn admin-btn--outline admin-btn--sm admin-btn--full" id="importBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Import JSON
        </button>
        <input type="file" id="importFileInput" accept=".json" style="display:none;">
        <button class="admin-btn admin-btn--danger admin-btn--sm admin-btn--full" id="logoutBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-main__header">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="admin-mobile-toggle" id="adminMobileToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="admin-main__title" id="adminSectionTitle">Navigation</h1>
        </div>
      </div>

      <div id="adminSections">
        <!-- Populated by JS -->
      </div>
    </main>

    <!-- Live Preview (outside main for position:fixed to work) -->
    <div class="admin-preview" id="adminPreview" style="display:none;">
      <div class="admin-preview__header">
        <span class="admin-preview__label">📺 Live Preview</span>
        <div class="admin-preview__controls">
          <button class="admin-btn admin-btn--outline admin-btn--sm" id="previewToggleBtn" title="Toggle preview">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Hide
          </button>
        </div>
      </div>
      <div class="admin-preview__frame-wrap" id="previewFrameWrap">
        <iframe id="previewFrame" src="index.html"></iframe>
      </div>
    </div>
  </div>

  <script src="js/translations.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
